<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WG-Treffpunkt – WG-Projekt Köln</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:'Syne',sans-serif; background:#0a0a0f; color:#f0f0f8; height:100vh; }
  .bg { position:fixed;inset:0;background:url('https://agwhtutxyfeatguquvrh.supabase.co/storage/v1/object/public/chat-media/2_WGHAUS.png') center/cover no-repeat;z-index:0; }
  .bg::after { content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,15,0.1) 0%,rgba(10,10,15,0.05) 15%,rgba(10,10,15,0.65) 50%,rgba(10,10,15,0.97) 100%); }
  .content { position:fixed;bottom:0;left:0;right:0;z-index:1;padding:0 40px 24px;display:flex;flex-direction:column;gap:10px; }
  .logo { font-weight:800;font-size:clamp(26px,3.8vw,50px);line-height:1;animation:fadeUp 0.6s ease both; }
  .tagline { font-weight:700;font-size:10px;color:#c8ff00;letter-spacing:3px;text-transform:uppercase;margin-top:-5px;animation:fadeUp 0.6s 0.05s ease both; }
  .label { font-weight:700;font-size:10px;color:#c8ff00;letter-spacing:3px;text-transform:uppercase;animation:fadeUp 0.6s 0.1s ease both; }
  .namen-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:4px 0;animation:fadeUp 0.6s 0.15s ease both; }
  .reihe { font-weight:700;font-size:clamp(11px,1.15vw,14px);color:#f0f0f8;letter-spacing:0.3px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .reihe .n { transition:color 0.15s,text-shadow 0.15s;cursor:default; }
  .reihe .n:hover { color:#c8ff00;text-shadow:0 0 10px rgba(200,255,0,0.5); }
  .sep { color:rgba(255,255,255,0.2);margin:0 4px; }
  .btn-chat { display:inline-flex;align-items:center;gap:9px;background:#c8ff00;color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 24px;border-radius:100px;text-decoration:none;width:fit-content;transition:all 0.2s;animation:fadeUp 0.6s 0.2s ease both; }
  .btn-chat:hover { background:#d4ff20;transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,255,0,0.3); }
  .btn-chat:hover svg { transform:translateX(4px); }
  .btn-chat svg { transition:transform 0.2s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="bg"></div>

  <div class="label">Mitbewohner</div>

    <div class="reihe"><span class="n">Emu</span><span class="sep">·</span><span class="n">Diego</span><span class="sep">·</span><span class="n">Linus</span><span class="sep">·</span><span class="n">Hendrik</span><span class="sep">·</span><span class="n">Larsi</span><span class="sep">·</span><span class="n">Andre</span></div>

</html>
